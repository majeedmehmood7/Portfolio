<!DOCTYPE html>
<html lang="en">  <!-- Added lang="en" for accessibility & SEO -->
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/profile.png" />
    <!-- Additional favicon sizes for better compatibility -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/profile.jpg" />

    <!-- Browser Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical (replace with your actual live URL) -->
    <link rel="canonical" href="https://Majeedportfolio.vercel.app" />

    <!-- Theme color (optional, matches your site design) -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Google Adsense -->
    <meta name="google-adsense-account" content="ca-pub-7334058961842274" />

    <!-- Primary SEO Meta Tags -->
    <title>Majeed | Software Engineer</title>
    <meta
      name="description"
      content="Majeed is a skilled Full Stack Developer specializing in ASP.NET Core, Flutter, Node.js, and modern web/mobile apps. Explore projects, skills, and hire for scalable solutions."
    />
    <meta name="author" content="Majeed" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Majeed – Full Stack Developer Portfolio" />
    <meta
      property="og:description"
      content="Explore Majeed's portfolio featuring web applications built using ASP.NET Core, Node.js, and modern technologies."
    />
    <meta property="og:image" content="https://Majeedportfolio.vercel.app/profile.jpg" /> <!-- Use absolute URL -->
    <meta property="og:image:alt" content="Majeed - Full Stack Developer Profile" />
    <meta property="og:image:width" content="1200" /> <!-- Recommended size -->
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://Majeedportfolio.vercel.app" />
    <meta property="og:site_name" content="Majeed Portfolio" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Majeed – Full Stack Developer" />
    <meta
      name="twitter:description"
      content="Full Stack Developer experienced in ASP.NET Core, Flutter, Node.js, and scalable backend systems."
    />
    <meta name="twitter:image" content="https://Majeedportfolio.vercel.app/profile.jpg" /> <!-- Absolute URL -->
    <meta name="twitter:image:alt" content="Majeed - Full Stack Developer Profile" />
    <meta name="twitter:site" content="@yourtwitterhandle" /> <!-- Optional: add if you have one -->
    <meta name="twitter:creator" content="@yourtwitterhandle" />

    <!-- Boxicons -->
    <link
      href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- Unicons -->
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.0.0/css/line.css"
    />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
